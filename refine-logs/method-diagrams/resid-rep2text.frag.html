    <div class="diagram-frame">
      <div class="diagram-cap">
        <span class="l">FIG. 01 — pipeline · last-token residual @L10 → adapter → frozen decoder → recovered text</span>
        <span>navy = data owner (trusted) · slate = adversary · amber = leak · dashed = train lane</span>
      </div>
      <svg class="flow" viewBox="0 0 1320 430" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/>
          </marker>
        </defs>
        <!-- ZONES -->
        <rect x="0"   y="40" width="470" height="370" class="zone-band zone-band-client"/>
        <rect x="470" y="40" width="850" height="370" class="zone-band zone-band-gpu"/>
        <text x="20"  y="62" class="zone-label">Data owner — trusted</text>
        <text x="20"  y="78" class="zone-sublabel">holds residual h ∈ ℝ²⁵⁶⁰ · runs frozen decoder φ</text>
        <text x="490" y="62" class="zone-label">Adversary — untrusted (WEIGHTS-PUB)</text>
        <text x="490" y="78" class="zone-sublabel">has φ (frozen) + published weights · fits adapter g</text>
        <line x1="470" y1="40" x2="470" y2="410" class="boundary"/>
        <text x="474" y="406" class="boundary-label">release (standardized residual h crosses to adversary)</text>

        <!-- OWNER -->
        <rect x="20" y="150" width="190" height="86" class="box box-strong box-client"/>
        <text x="34" y="174" class="box-label">secret text X</text>
        <text x="34" y="192" class="box-sub">prompt · 6–59 words</text>
        <text x="34" y="210" class="box-sub">length axis ↓ degrades recovery</text>
        <rect x="240" y="150" width="200" height="86" class="box box-client"/>
        <text x="254" y="174" class="box-label">last-token residual @L10</text>
        <text x="254" y="192" class="box-mono">h = standardize(resid) ∈ ℝ²⁵⁶⁰</text>
        <text x="254" y="210" class="box-sub">SECRET surface (trusted-side capture)</text>

        <!-- ADVERSARY: adapter g -->
        <rect x="500" y="150" width="220" height="86" class="box box-strong box-gpu"/>
        <text x="514" y="174" class="box-label">① adapter g — 3-layer MLP</text>
        <text x="514" y="192" class="box-mono">h → 8 soft-prompt embeddings</text>
        <text x="514" y="210" class="box-sub">the learned attack (φ frozen)</text>

        <rect x="760" y="150" width="200" height="86" class="box box-gpu"/>
        <text x="774" y="174" class="box-label">② frozen decoder φ</text>
        <text x="774" y="192" class="box-mono">soft prompts → tokens</text>
        <text x="774" y="210" class="box-sub">weights fixed · never tuned</text>

        <!-- TRAIN lane (dashed) -->
        <rect x="500" y="290" width="460" height="74" class="box box-gpu" style="opacity:.92;stroke-dasharray:5 3;"/>
        <text x="514" y="312" class="box-label">TRAIN (teacher-forced fit · dashed)</text>
        <text x="514" y="330" class="box-mono">10 passes · 762 prompts · CE 3.07 → 2.09 nats</text>
        <text x="514" y="348" class="box-sub">fits g only; gradients stop at frozen φ</text>

        <!-- ATTACK arm: recovered text -->
        <rect x="1010" y="138" width="290" height="86" class="box box-strong box-gpu box-warn"/>
        <text x="1024" y="162" class="box-label warn">③ recovered text x̂ (INFER · solid)</text>
        <text x="1024" y="180" class="box-sub">greedy gen · 138 held-out · 6 length buckets</text>
        <text x="1024" y="198" class="box-mono">token-F1 = real − shuffled (genuine leak)</text>
        <text x="1024" y="216" class="box-sub">controls: mean 0.002 · shuffled ≈ 0.108</text>

        <!-- PROBE arm: I_G (vacuous) -->
        <rect x="1010" y="278" width="290" height="96" class="box box-gpu box-warn" style="opacity:.92;"/>
        <text x="1024" y="300" class="box-label">probe I_G(σ) — geometry-only · no attack</text>
        <text x="1024" y="318" class="box-mono">I_G = ½Σ log₂(1+λᵢ/σ²)</text>
        <text x="1024" y="336" class="box-sub">from Σ=Cov(h) + σ · never decodes text</text>
        <text x="1024" y="354" class="box-sub warn">vacuous capacity ⇒ non-binding (no track)</text>
        <text x="1024" y="370" class="box-mono">r(L) = min(I_G, H_X(L)) / H_X(L)</text>

        <!-- ARROWS -->
        <path d="M210 193 L240 193" class="arrow arrow-secret" marker-end="url(#ah)"/>
        <text x="216" y="186" class="arrow-label secret">X</text>
        <path d="M440 193 L500 193" class="arrow arrow-masked" marker-end="url(#ah)"/>
        <text x="452" y="186" class="arrow-label masked">h released</text>
        <path d="M720 193 L760 193" class="arrow" marker-end="url(#ah)"/>
        <text x="726" y="186" class="arrow-label">8 soft prompts</text>
        <path d="M960 180 L1010 178" class="arrow arrow-warn" marker-end="url(#ah)"/>
        <text x="966" y="170" class="arrow-label warn">x̂</text>
        <!-- train-lane dashed feedback to adapter -->
        <path d="M610 290 C610 264 610 250 610 236" class="arrow arrow-masked" marker-end="url(#ah)" style="stroke-dasharray:5 3;"/>
        <text x="618" y="266" class="arrow-label masked">teacher-forced loss → g</text>
        <path d="M860 290 C860 264 860 250 860 236" class="arrow arrow-masked" marker-end="url(#ah)" style="stroke-dasharray:5 3;opacity:.7;"/>
        <text x="868" y="278" class="arrow-label masked">φ next-token CE</text>
        <!-- probe arm: residual covariance -> I_G (independent of attack) -->
        <path d="M340 236 C340 392 700 392 1010 326" class="arrow" marker-end="url(#ah)" style="opacity:.65;"/>
        <text x="560" y="404" class="arrow-label">Σ = Cov(h), σ</text>
      </svg>
    </div>
