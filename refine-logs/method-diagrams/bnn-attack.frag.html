    <div class="diagram-frame">
      <div class="diagram-cap">
        <span class="l">FIG. 0 — pipeline · token → public embedding lookup → clip + DP release → nearest-neighbour (MAP) decode</span>
        <span>navy = data owner (trusted) · ochre = public embedding table · plum = DP mechanism · slate = adversary · amber = recovery · adapted from the §01 setup data-flow</span>
      </div>
      <svg class="flow" viewBox="0 0 1320 440" role="img"
           xmlns="http://www.w3.org/2000/svg"
           aria-label="A token is looked up in a public embedding table, clipped and Gaussian-noised under DP, released, then matched to its nearest table entry; two geometry-only bounds bracket the decode error.">
        <defs>
          <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/>
          </marker>
        </defs>

        <!-- ZONES -->
        <rect x="0"    y="40"  width="470" height="380" class="zone-band zone-band-client"/>
        <rect x="470"  y="40"  width="260" height="380" class="zone-band zone-band-crypto"/>
        <rect x="730"  y="40"  width="590" height="380" class="zone-band zone-band-gpu"/>
        <text x="20"  y="62" class="zone-label">Data owner — trusted</text>
        <text x="20"  y="78" class="zone-sublabel">holds token v · runs L0 embedding lookup</text>
        <text x="490" y="62" class="zone-label">DP mechanism (input-DP)</text>
        <text x="490" y="78" class="zone-sublabel">clip(·, C≈4.15) + Gaussian noise · σ = C·z/ε</text>
        <text x="750" y="62" class="zone-label">Adversary — untrusted (WEIGHTS-PUB)</text>
        <text x="750" y="78" class="zone-sublabel">has the public table {e_u} · runs nearest-neighbour decode</text>
        <line x1="470" y1="40" x2="470" y2="420" class="boundary"/>
        <line x1="730" y1="40" x2="730" y2="420" class="boundary"/>
        <text x="734" y="416" class="boundary-label">release (only Y crosses to adversary)</text>

        <!-- OWNER: token + public table -->
        <rect x="20" y="150" width="190" height="72" class="box box-strong box-client"/>
        <text x="34" y="174" class="box-label">① secret token v</text>
        <text x="34" y="192" class="box-sub">one token id</text>
        <text x="34" y="210" class="box-mono">K = 2048 vocab</text>

        <rect x="240" y="142" width="200" height="92" class="box box-client box-storage"/>
        <text x="254" y="166" class="box-label">② embedding lookup</text>
        <text x="254" y="184" class="box-mono">e_v = table[v] ∈ ℝ^d</text>
        <text x="254" y="202" class="box-sub">d = 2304 · table {e_u} PUBLIC</text>
        <text x="254" y="222" class="box-sub">(open weights)</text>

        <!-- DP mechanism -->
        <rect x="490" y="138" width="220" height="100" class="box box-strong box-crypto"/>
        <text x="504" y="162" class="box-label">③ clip + add DP noise</text>
        <text x="504" y="180" class="box-mono">e_v ← clip(e_v, C)</text>
        <text x="504" y="198" class="box-mono">Y = e_v + ε,  ε ∼ 𝒩(0, σ²I_d)</text>
        <text x="504" y="218" class="box-sub">σ = C·z/ε_dp · smaller budget ε_dp → larger σ</text>

        <!-- ADVERSARY: NN / MAP decode -->
        <rect x="760" y="120" width="250" height="92" class="box box-strong box-gpu"/>
        <text x="774" y="144" class="box-label">④ nearest-neighbour decode</text>
        <text x="774" y="162" class="box-mono">v̂ = argmin_u ‖Y − e_u‖</text>
        <text x="774" y="182" class="box-sub">MAP / Bayes-optimal under Gaussian noise</text>
        <text x="774" y="200" class="box-sub">no training · no model · just the table</text>

        <!-- recovered token (warn) -->
        <rect x="1080" y="128" width="220" height="76" class="box box-strong box-gpu box-warn"/>
        <text x="1094" y="152" class="box-label warn">recovered token v̂</text>
        <text x="1094" y="170" class="box-sub">accuracy / decode-error rate</text>
        <text x="1094" y="188" class="box-mono">≈ v at weak DP</text>

        <!-- PROBE path: two-sided geometry-only bounds -->
        <rect x="760" y="262" width="540" height="138" class="box box-gpu" style="opacity:.92;"/>
        <text x="774" y="286" class="box-label">probe — Bhattacharyya–Fano error bounds (no attack · geometry-only)</text>
        <text x="774" y="306" class="box-mono">upper: P_e ≤ Σ_{u≠v} exp(−‖e_v − e_u‖²/8σ²)   (union–Bhattacharyya)</text>
        <text x="774" y="324" class="box-sub">dominated by the few close pairs ⇒ names WHERE leakage is</text>
        <text x="774" y="346" class="box-mono">lower: P_e ≥ (H(V|Y) − 1) / log₂(K − 1)   (Fano)</text>
        <text x="774" y="364" class="box-sub">H(V|Y) = log₂K − I(V;Y) · matching ambiguity, in bits</text>
        <text x="774" y="386" class="box-sub warn">bracket the measured BNN error at every noise level (10/10)</text>

        <!-- ARROWS -->
        <path d="M210 186 L240 186" class="arrow arrow-secret" marker-end="url(#ah)"/>
        <text x="216" y="178" class="arrow-label secret">v</text>
        <path d="M440 188 L490 188" class="arrow arrow-secret" marker-end="url(#ah)"/>
        <text x="446" y="180" class="arrow-label secret">e_v</text>
        <path d="M710 178 L760 166" class="arrow arrow-masked" marker-end="url(#ah)"/>
        <text x="600" y="120" class="arrow-label masked">Y released</text>
        <path d="M1010 166 L1080 166" class="arrow arrow-warn" marker-end="url(#ah)"/>
        <text x="1024" y="158" class="arrow-label warn">v̂</text>
        <!-- probe arm: released Y geometry + σ feed the bounds, independently of the attack -->
        <path d="M845 212 C820 240 800 252 790 262" class="arrow arrow-masked" marker-end="url(#ah)" style="stroke-dasharray:4 3;"/>
        <text x="700" y="250" class="arrow-label masked">{e_u}, σ (no attack)</text>
      </svg>
    </div>
